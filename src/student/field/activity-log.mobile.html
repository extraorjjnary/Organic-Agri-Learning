<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#5bec13',
              'background-light': '#f6f8f6',
              'background-dark': '#162210',
            },
            fontFamily: {
              display: ['Lexend'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Lexend', sans-serif;
      }
      .custom-select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen"
  >
    <div
      class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden"
    >
      <!-- Top App Bar -->
      <div
        class="flex items-center bg-white dark:bg-slate-900 p-4 pb-4 justify-between border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10"
      >
        <div
          class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2
          class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-4"
        >
          Log Field Activity
        </h2>
        <div
          class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 cursor-pointer"
        >
          <span class="material-symbols-outlined">help_outline</span>
        </div>
      </div>
      <div class="flex flex-col w-full max-w-xl mx-auto p-4 space-y-6">
        <!-- Activity Selection -->
        <div class="flex flex-col gap-2">
          <label class="flex flex-col min-w-40 flex-1">
            <p
              class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2"
            >
              Activity Type
            </p>
            <select
              class="custom-select flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 px-4 text-base font-normal"
            >
              <option disabled="" selected="" value="">Select activity</option>
              <option value="sowing">Sowing</option>
              <option value="weeding">Weeding</option>
              <option value="fertilizing">Fertilizing</option>
              <option value="irrigation">Irrigation</option>
              <option value="harvesting">Harvesting</option>
            </select>
          </label>
        </div>
        <!-- Date Picker -->
        <div class="flex flex-col gap-2">
          <label class="flex flex-col min-w-40 flex-1">
            <p
              class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2"
            >
              Date
            </p>
            <div
              class="flex w-full flex-1 items-stretch rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 overflow-hidden focus-within:ring-2 focus-within:ring-primary"
            >
              <input
                class="form-input flex w-full min-w-0 flex-1 resize-none border-0 bg-transparent h-14 px-4 text-slate-900 dark:text-slate-100 text-base font-normal leading-normal focus:ring-0"
                type="date"
                value="2023-10-27"
              />
              <div
                class="text-slate-500 dark:text-slate-400 flex items-center justify-center px-4"
                data-icon="Calendar"
              >
                <span class="material-symbols-outlined">calendar_today</span>
              </div>
            </div>
          </label>
        </div>
        <!-- Weather Conditions -->
        <div class="flex flex-col gap-2">
          <label class="flex flex-col min-w-40 flex-1">
            <p
              class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2"
            >
              Weather Conditions
            </p>
            <div class="relative">
              <input
                class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 px-4 text-base font-normal placeholder:text-slate-400 dark:placeholder:text-slate-500"
                placeholder="e.g. Sunny, 25°C"
                value=""
              />
              <div
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"
              >
                <span class="material-symbols-outlined">wb_sunny</span>
              </div>
            </div>
          </label>
        </div>
        <!-- Observations -->
        <div class="flex flex-col gap-2">
          <label class="flex flex-col min-w-40 flex-1">
            <p
              class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-2"
            >
              Observations
            </p>
            <textarea
              class="form-input flex w-full min-w-0 flex-1 resize-none rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 min-h-[160px] p-4 text-base font-normal leading-relaxed placeholder:text-slate-400 dark:placeholder:text-slate-500"
              placeholder="Enter any specific details or notes..."
            ></textarea>
          </label>
        </div>
        <!-- Add Photo Button -->
        <div class="flex flex-col gap-2">
          <p
            class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-normal pb-1"
          >
            Media
          </p>
          <button
            class="flex items-center justify-center gap-2 w-full h-24 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl bg-white/50 dark:bg-slate-900/50 hover:bg-primary/10 transition-colors group"
          >
            <span
              class="material-symbols-outlined text-slate-400 group-hover:text-primary"
              >add_a_photo</span
            >
            <span
              class="text-slate-500 dark:text-slate-400 font-medium group-hover:text-primary"
              >Add Photo</span
            >
          </button>
        </div>
        <!-- Spacer for bottom button -->
        <div class="h-12"></div>
      </div>
      <!-- Bottom Action Area -->
      <div
        class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-200 dark:border-slate-800"
      >
        <div class="max-w-xl mx-auto flex gap-3">
          <button
            class="flex-1 bg-primary text-slate-900 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-transform"
          >
            <span class="material-symbols-outlined">cloud_off</span>
            Save Offline
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
